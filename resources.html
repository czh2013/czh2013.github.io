    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: 
                linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)),
                url('https://free.picui.cn/free/2025/11/09/691097ce53c4b.png') fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }

        /* 顶部导航栏 */
        .header {
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        .nav a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            margin-left: 35px;
            transition: opacity 0.3s;
        }

        .nav a:hover {
            opacity: 0.8;
        }

        /* 软件元素覆盖 */
        .software-global-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
        }

        .software-global-overlay::before {
            content: "";
            position: absolute;
            width: 150px;
            height: 150px;
            background: url('https://cdn-icons-png.flaticon.com/512/226/226777.png') no-repeat;
            background-size: contain;
            top: 30%;
            left: 10%;
        }

        .software-global-overlay::after {
            content: "";
            position: absolute;
            width: 120px;
            height: 120px;
            background: url('https://www.freeiconspng.com/uploads/c--logo-icon-0.png') no-repeat;
            background-size: contain;
            top: 50%;
            right: 15%;
        }

        /* 内容容器 */
        .container {
            padding: 150px 8% 50px;
            position: relative;
            z-index: 1;
        }

        /* 软件卡片网格 */
        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            justify-content: center;
        }

        .software-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .software-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-5px);
        }

        .software-type {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }

        .type-website {
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
        }

        .type-software {
            background: linear-gradient(90deg, #ff758c 0%, #ff7eb3 100%);
        }

        .type-other {
            background: linear-gradient(90deg, #f7971e 0%, #ffd200 100%);
        }

        .software-icon img {
            width: 50px;
            filter: brightness(0) invert(1);
        }

        .software-title {
            color: white;
            margin: 15px 0;
        }

        .software-description {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            line-height: 1.6;
        }

        /* 下载按钮 */
        .download-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .download-btn:hover {
            opacity: 0.85;
        }

        /* 网站信息显示 */
        .site-info {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            line-height: 1.8;
            min-width: 150px;
        }

        .site-info span {
            color: #4facfe;
        }

        /* 页脚样式 */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 4, 40, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
            z-index: 100;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .footer-link {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .footer-link:hover {
            color: #4facfe;
            transform: translateY(-1px);
        }

        .discord-link:hover {
            color: #5865F2;
        }

        .footer-separator {
            color: rgba(255,255,255,0.3);
            font-size: 14px;
        }

        .copyright {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header { padding: 15px 5%; }
            .nav a { margin-left: 15px; }
            .container { padding: 120px 5% 30px; }
            .site-info { 
                font-size: 12px; 
                padding: 10px;
                bottom: 70px;
                min-width: 130px;
            }
            .site-footer { padding: 12px 0; }
            .footer-links {
                gap: 10px;
                flex-direction: column;
            }
            .footer-separator { display: none; }
            .footer-link, .copyright { font-size: 12px; }
        }
    </style>
</head>

    <script>
        // ===== 用户访问次数 =====
        let visitCount = localStorage.getItem('visitCount') || 0;
        visitCount++;
        localStorage.setItem('visitCount', visitCount);
        document.getElementById('visitCount').textContent = visitCount;

        // ===== 运营时间计算 =====
        function calculateUptimeDetail() {
            const startDate = new Date('2025-08-24T09:00:00');
            const now = new Date();
            let diff = now - startDate;
            const seconds = Math.floor(diff / 1000) % 60;
            const minutes = Math.floor(diff / (1000 * 60)) % 60;
            const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const years = Math.floor(days / 365);
            const months = Math.floor((days % 365) / 30);
            const remainingDays = days % 365 % 30;
            
            let timeString = '';
            if (years > 0) timeString += `${years}年`;
            if (months > 0 || years > 0) timeString += `${months}月`;
            timeString += `${remainingDays}天${hours}时${minutes}分${seconds}秒`;
            document.getElementById('uptimeDetail').textContent = timeString;
        }
        calculateUptimeDetail();
        setInterval(calculateUptimeDetail, 1000);
    </script>
