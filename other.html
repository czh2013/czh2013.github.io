        .header {
            background: linear-gradient(135deg, #000428 0%, #004e92 100%);

            justify-content: space-between;

        .logo { font-size:24px; font-weight:bold; color:white; }

        }
        .nav a:hover { opacity:0.8; }
        .container {
            padding: 150px 8% 50px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .page-title { text-align:center; margin-bottom:30px; }
        .page-title h1 {
            font-size:2.5rem;
            background: linear-gradient(90deg,#00f2fe,#4facfe);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            display:inline-block;
        }
        .page-title p { opacity:0.7; margin-top:8px; }

        .search-box {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }
        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(6px);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.5); }
        .search-box input:focus {
            border-color: #4facfe;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 20px rgba(79,172,254,0.15);
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .category-tab {
            padding: 8px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        .category-tab:hover, .category-tab.active {
            background: linear-gradient(90deg,#00f2fe,#4facfe);
            color: #fff;
            border-color: transparent;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(6px);
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .product-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .product-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }
        .product-name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }
        .product-badge {
            font-size: 10px;
            background: rgba(79,172,254,0.3);
            padding: 2px 10px;
            border-radius: 20px;
            color: #aad0ff;
        }
        .no-products {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 0;
            opacity: 0.5;
        }

        .update-notice {
            text-align: center;
            margin: 40px 0 20px;
            padding: 12px 20px;
            background: rgba(79,172,254,0.1);
            border: 1px solid rgba(79,172,254,0.2);
            border-radius: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
        }
        .update-notice i {
            color: #4facfe;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity:0.4; }
            50% { opacity:1; }
            100% { opacity:0.4; }
        }
        .update-notice .count-sep {
            opacity:0.5;
            margin:0 8px;
        }

        .region-modal {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        .region-modal.active { display: flex; }
        .region-modal-content {
            background: rgba(10,20,40,0.95);
            border-radius: 24px;
            padding: 35px 40px;
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            animation: modalFade 0.3s ease;
        }
        @keyframes modalFade {
            0% { transform:scale(0.9); opacity:0; }
            100% { transform:scale(1); opacity:1; }
        }
        .region-modal-content h3 {
            margin-bottom: 25px;
            font-size: 22px;
            color: #fff;
        }
        .region-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .region-btn {
            padding: 12px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .region-btn:hover {
            background: rgba(79,172,254,0.25);
            border-color: #4facfe;
        }
        .region-btn i { color:#4facfe; }
        .modal-close-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .modal-close-btn:hover { background: rgba(255,255,255,0.2); }

        .site-info {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            text-align: right;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
            line-height: 1.8;
        }
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0,4,40,0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);

        .footer-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;

        .footer-link {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 14px;

        .copyright { color:rgba(255,255,255,0.6); font-size:14px; }

            .footer-link, .copyright { font-size:12px; }

                iconUrl: 'https://favicon.run/favicon?domain=jsonformatter.org&sz=128',
                category: '其他工具',
                keywords: ['json', '格式化', 'formatter'],
                regions: [{ label: '国际版', url: 'https://jsonformatter.org' }]
            },
            '360Browser': {
                name: '360浏览器',
                iconUrl: 'https://favicon.run/favicon?domain=se.360.cn&sz=128',
                category: '其他工具',
                keywords: ['浏览器', 'browser', '360'],
                regions: [{ label: '中国版', url: 'https://se.360.cn' }]
            },
            '360Security': {
                name: '360安全卫士',
                iconUrl: 'https://favicon.run/favicon?domain=360.cn&sz=128',
                category: '其他工具',
                keywords: ['安全', 'security', '杀毒', 'antivirus', '360'],
                regions: [{ label: '中国版', url: 'https://www.360.cn' }]
            },
            'Huorong': {
                name: '火绒安全',
                iconUrl: 'https://favicon.run/favicon?domain=huorong.cn&sz=128',
                category: '其他工具',
                keywords: ['安全', 'security', '杀毒', 'antivirus', '火绒', 'huorong'],
                regions: [{ label: '中国版', url: 'https://www.huorong.cn' }]
            },
            'BaiduNetdisk': {
                name: '百度网盘',
                iconUrl: 'https://favicon.run/favicon?domain=pan.baidu.com&sz=128',
                category: '其他工具',
                keywords: ['网盘', 'cloud storage', '云盘', 'baidu', '百度'],
                regions: [{ label: '中国版', url: 'https://pan.baidu.com' }]
            },
            'AliyunDrive': {
                name: '阿里云盘',
                iconUrl: 'https://favicon.run/favicon?domain=aliyundrive.com&sz=128',
                category: '其他工具',
                keywords: ['网盘', 'cloud storage', '云盘', 'aliyun', '阿里'],
                regions: [{ label: '中国版', url: 'https://www.aliyundrive.com' }]
            },
            'TencentWeiyun': {
                name: '腾讯微云',
                iconUrl: 'https://favicon.run/favicon?domain=weiyun.com&sz=128',
                category: '其他工具',
                keywords: ['网盘', 'cloud storage', '云盘', 'tencent', '腾讯'],
                regions: [{ label: '中国版', url: 'https://www.weiyun.com' }]
            },
            '115Wangpan': {
                name: '115网盘',
                iconUrl: 'https://favicon.run/favicon?domain=115.com&sz=128',
                category: '其他工具',
                keywords: ['网盘', 'cloud storage', '云盘', '115'],
                regions: [{ label: '中国版', url: 'https://115.com' }]
            },
            'Xunlei': {
                name: '迅雷',
                iconUrl: 'https://favicon.run/favicon?domain=xunlei.com&sz=128',
                category: '其他工具',
                keywords: ['下载', 'download', '迅雷', 'xunlei'],
                regions: [{ label: '中国版', url: 'https://www.xunlei.com' }]
            }
        };

        // 提取分类列表并排序
        const categories = [...new Set(Object.values(productsData).map(p => p.category))].sort();

        // ============================================================
        // 渲染函数
        // ============================================================
        const categoryTabs = document.getElementById('categoryTabs');
        const productGrid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const totalProductCount = document.getElementById('totalProductCount');
        const filteredProductCount = document.getElementById('filteredProductCount');

        let currentCategory = '全部';
        let currentSearchTerm = '';

        // 扩展搜索：匹配名称、分类和关键词
        function matchProduct(product, term) {
            const lowerTerm = term.toLowerCase();
            if (product.name.toLowerCase().includes(lowerTerm)) return true;
            if (product.category.toLowerCase().includes(lowerTerm)) return true;
            if (product.keywords && product.keywords.some(k => k.toLowerCase().includes(lowerTerm))) return true;
            return false;
        }

        function renderTabs() {
            let html = `<div class="category-tab active" data-category="全部">全部</div>`;
            categories.forEach(cat => {
                html += `<div class="category-tab" data-category="${cat}">${cat}</div>`;
            });
            categoryTabs.innerHTML = html;

            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentCategory = this.dataset.category;
                    renderProducts();
                });
            });
        }

        function renderProducts() {
            const keys = Object.keys(productsData);
            let filteredKeys = keys;

            if (currentCategory !== '全部') {
                filteredKeys = filteredKeys.filter(key => productsData[key].category === currentCategory);
            }

            if (currentSearchTerm.trim() !== '') {
                const term = currentSearchTerm.trim();
                filteredKeys = filteredKeys.filter(key => matchProduct(productsData[key], term));
            }

            // 更新计数
            totalProductCount.textContent = keys.length;
            filteredProductCount.textContent = filteredKeys.length;

            if (filteredKeys.length === 0) {
                productGrid.innerHTML = `<div class="no-products">未找到相关产品</div>`;
                return;
            }

            let html = '';
            filteredKeys.forEach(key => {
                const p = productsData[key];
                const regionCount = p.regions.length;
                html += `
                    <div class="product-card" data-key="${key}">
                        <div class="product-icon">
                            <img src="${p.iconUrl}" alt="${p.name}" loading="lazy" />
                        </div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-badge">${regionCount} 个版本</div>
                    </div>
                `;
            });
            productGrid.innerHTML = html;

            document.querySelectorAll('.product-card').forEach(card => {
                card.addEventListener('click', function() {
                    const key = this.dataset.key;
                    openRegionModal(key);
                });
            });
        }

        // ============================================================
        // 弹窗逻辑
        // ============================================================
        const regionModal = document.getElementById('regionModal');
        const modalTitle = document.getElementById('modalTitle');
        const regionList = document.getElementById('regionList');
        const closeModalBtn = document.getElementById('closeModalBtn');

        function openRegionModal(key) {
            const product = productsData[key];
            if (!product) return;

            modalTitle.textContent = `选择 ${product.name} 的地区版本`;
            regionList.innerHTML = '';

            product.regions.forEach(region => {
                const btn = document.createElement('button');
                btn.className = 'region-btn';
                btn.innerHTML = `<span>${region.label}</span><i class="fas fa-chevron-right"></i>`;
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    window.open(region.url, '_blank');
                    regionModal.classList.remove('active');
                });
                regionList.appendChild(btn);
            });

            regionModal.classList.add('active');
        }

        function closeModal() {
            regionModal.classList.remove('active');
        }
        closeModalBtn.addEventListener('click', closeModal);
        regionModal.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ============================================================
        // 搜索监听
        // ============================================================
        searchInput.addEventListener('input', function() {
            currentSearchTerm = this.value;
            renderProducts();
        });

        // ============================================================
        // 初始化
        // ============================================================
        renderTabs();
        renderProducts();

        // ============================================================
        // 原有统计功能
        // ============================================================
        let visitCount = localStorage.getItem('visitCount') || 0;
        visitCount++;
        localStorage.setItem('visitCount', visitCount);
        document.getElementById('visitCount').textContent = visitCount;

        function calculateUptimeDetail() {
            const startDate = new Date('2025-08-24T09:00:00');
            const now = new Date();
            let diff = now - startDate;
            const seconds = Math.floor(diff / 1000) % 60;
            const minutes = Math.floor(diff / (1000 * 60)) % 60;
            const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const years = Math.floor(days / 365);
            const months = Math.floor((days % 365) / 30);
            const remainingDays = days % 365 % 30;
            let timeString = '';
            if (years > 0) timeString += `${years}年`;
            if (months > 0 || years > 0) timeString += `${months}月`;
            timeString += `${remainingDays}天${hours}时${minutes}分${seconds}秒`;
            document.getElementById('uptimeDetail').textContent = timeString;
        }
        calculateUptimeDetail();
        setInterval(calculateUptimeDetail, 1000);
    </script>
